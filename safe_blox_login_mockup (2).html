<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blox-Style Login Mockup</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 20% 20%, rgba(70, 110, 255, .25), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 90, 170, .18), transparent 25%),
        radial-gradient(circle at 40% 80%, rgba(0, 255, 200, .12), transparent 25%),
        #07080d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: #17191f;
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 0 18px;
      font-weight: 700;
    }

    .logo {
      width: 26px;
      height: 26px;
      background: white;
      transform: rotate(15deg);
      position: relative;
    }

    .logo::after {
      content: "";
      width: 8px;
      height: 8px;
      background: #17191f;
      position: absolute;
      top: 9px;
      left: 9px;
    }

    .search {
      margin-left: 20px;
      max-width: 360px;
      width: 35vw;
      background: #22252d;
      border: 1px solid #3b3f4b;
      border-radius: 8px;
      padding: 9px 14px;
      color: white;
    }

    .signup-top {
      margin-left: auto;
      background: #335fff;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 9px 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .card {
      width: 362px;
      background: #2d3038;
      padding: 26px 16px 34px;
      border-radius: 2px;
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 31px;
      line-height: 1.15;
    }

    input {
      width: 100%;
      height: 38px;
      margin: 9px 0;
      border: 1px solid #555a67;
      border-radius: 8px;
      background: #393d47;
      color: white;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #9aa7ff;
      box-shadow: 0 0 0 3px rgba(154,167,255,.15);
    }

    .login-btn {
      width: 100%;
      height: 38px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #d5d8df;
      background: transparent;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .link {
      display: block;
      color: white;
      text-decoration: none;
      font-weight: 700;
      margin: 24px 0 30px;
    }

    hr {
      border: 0;
      border-top: 1px solid #444852;
      margin-bottom: 18px;
    }

    .secondary {
      width: 100%;
      height: 37px;
      margin: 6px 0;
      border: 0;
      border-radius: 8px;
      background: #444854;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    .notice {
      margin-top: 14px;
      color: #c9ceda;
      font-size: 13px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo" aria-hidden="true"></div>
    <span>Charts</span>
    <span>Marketplace</span>
    <span>Create</span>
    <span>Robux</span>
    <input class="search" type="text" placeholder="Search" />
    <button class="signup-top">Sign Up</button>
  </div>

  <main class="card">
    <h1>Log in to Roblox</h1>

    <form onsubmit="event.preventDefault(); 
      <input type="text" name="username" placeholder="Username/Email/Phone" autocomplete="off" />
      <input type="password" name="password" placeholder="Password" autocomplete="off" />
      <button class="login-btn" type="submit">Log In</button>
    </form>

    <a class="link" href="#">Forgot Password or Username?</a>
    <hr />
    <button class="secondary">Email Me a One-Time Code</button>
    <button class="secondary">Quick Sign-in</button>

    <p>Don't have an account? <strong>Sign Up</strong></p>
  </main>
</body>
</html>
